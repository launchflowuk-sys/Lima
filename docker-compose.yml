services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lima}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-lima}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lima}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data

  web:
    build:
      context: .
    restart: unless-stopped
    # Run DB migrations, then start. Kept in the long-running web service (instead of a
    # one-shot `migrate` service) so nothing exits 0 and gets read as "unhealthy" by the
    # orchestrator. env.ts validates the whole schema on first access, so it needs full .env.
    command: ["sh", "-c", "pnpm db:migrate && pnpm start"]
    env_file: .env
    # Internal service wiring, derived from the POSTGRES_* vars. Set here (not left to the
    # platform env) so the stack is self-wiring and reproducible; overrides any env_file value.
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lima}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lima}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage:/data/storage

  worker:
    build:
      context: .
    restart: unless-stopped
    command: ["pnpm", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lima}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lima}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage:/data/storage

volumes:
  pg-data:
  redis-data:
  storage:
